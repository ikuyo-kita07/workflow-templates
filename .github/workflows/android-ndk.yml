name: Setup Android NDK
on:
  workflow_call:
jobs:
  ndk:
    runs-on: ubuntu-latest
    steps:
      - name: Download Android NDK
        run: |
          set -e
          curVe=$(curl -s https://dl.google.com/android/repository/repository2-3.xml \
            | grep -o 'path="ndk;[^"]*"' \
            | sed 's/path="ndk;//;s/"//' \
            | sort -V \
            | tail -n 1)
          if [ -z "$curVe" ]; then
            echo "Failed to fetch latest Android NDK"
            exit 1
          fi
          major=$(echo "$curVe" | cut -d'.' -f1)
          wget "https://dl.google.com/android/repository/android-ndk-r${major}-linux.zip" &>/dev/null
          unzip "android-ndk-r${major}-linux.zip" &>/dev/null
          echo "NDK_DIR=android-ndk-r${major}" >> $GITHUB_ENV
      - name: Verify clang
        run: |
          $NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android30-clang --version
      - uses: actions/upload-artifact@v4
        with:
          name: android-ndk
          path: ${{ env.NDK_DIR }}
